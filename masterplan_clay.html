<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Riverland · Stylized 3D Masterplan</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
:root {
  --bg-deep:   #0e1a0e;
  --bg-warm:   #1a2516;
  --cream:     #E8DFC4;
  --cream-light:#F5EFD8;
  --gold:      #C4A86B;
  --gold-light:#D9C089;
  --sage:      #7a8a5e;
  --terracotta:#a64a2c;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden;
  font-family: 'Outfit', 'Segoe UI', sans-serif;
  background: linear-gradient(180deg, #1f2c1d 0%, #0e1a0e 60%, #07120a 100%);
  color: var(--cream);
}
#scene { position: fixed; inset: 0; }

#topbar {
  position: fixed; top: 14px; left: 14px; z-index: 10;
  background: rgba(14,26,14,0.78); backdrop-filter: blur(8px);
  border: 1px solid rgba(196,168,107,0.25); border-radius: 6px;
  padding: 9px 14px; box-shadow: 0 4px 18px rgba(0,0,0,0.4);
}
#topbar h1 { font-family: 'Cormorant Garamond', serif; font-size: 1rem;
  color: var(--gold); letter-spacing: 0.18em; text-transform: uppercase;
  font-weight: 500; margin: 0 0 2px 0; }
#topbar small { color: var(--cream-light); opacity: 0.65; font-size: 0.7rem;
  letter-spacing: 0.04em; }

#controls {
  position: fixed; top: 14px; right: 14px; z-index: 10;
  background: rgba(14,26,14,0.85); backdrop-filter: blur(8px);
  color: var(--cream); padding: 12px 14px; border-radius: 6px;
  border: 1px solid rgba(196,168,107,0.25); min-width: 200px;
  box-shadow: 0 4px 18px rgba(0,0,0,0.4); font-size: 11px;
}
#controls h3 { font-size: 0.6rem; color: var(--gold); text-transform: uppercase;
  letter-spacing: 0.18em; margin: 0 0 6px; font-weight: 500; }
#controls h3:not(:first-of-type) { margin-top: 12px; }
#controls button {
  display: inline-block; padding: 5px 9px; margin: 3px 2px 0 0;
  border: 1px solid rgba(196,168,107,0.45);
  background: rgba(14,26,14,0.6); color: var(--gold-light);
  border-radius: 4px; cursor: pointer; font-size: 11px;
  font-family: inherit; transition: 0.18s;
}
#controls button:hover { background: var(--gold); color: var(--bg-deep);
  border-color: var(--gold); }
#controls button.active { background: var(--gold); color: var(--bg-deep); }
#controls label { display: block; margin: 5px 0; cursor: pointer; }
#controls input[type=range] { width: 100%; margin-top: 2px;
  accent-color: var(--gold); }

#hud {
  position: fixed; bottom: 12px; left: 12px; z-index: 10;
  background: rgba(14,26,14,0.78); backdrop-filter: blur(6px);
  color: var(--cream-light); padding: 6px 10px;
  border-radius: 4px; font-size: 10px;
  border: 1px solid rgba(196,168,107,0.2);
}
#hud .key { color: var(--gold); font-weight: 600; }

#loader {
  position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
  background: linear-gradient(180deg, #1f2c1d 0%, #0e1a0e 60%, #07120a 100%);
  z-index: 100; flex-direction: column;
  font-family: 'Cormorant Garamond', serif; color: var(--gold);
}
#loader .ring { width: 50px; height: 50px;
  border: 3px solid rgba(196,168,107,0.2); border-top-color: var(--gold);
  border-radius: 50%; animation: spin 0.9s linear infinite;
  margin-bottom: 18px; }
@keyframes spin { to { transform: rotate(360deg); } }
#loader-msg { font-size: 0.95rem; letter-spacing: 0.18em; text-transform: uppercase; }
#loader-progress { font-size: 0.75rem; color: var(--cream-light); opacity: 0.7;
  margin-top: 6px; font-family: 'Outfit', sans-serif; letter-spacing: 0.1em; }

#info-card {
  position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
  background: rgba(14,26,14,0.85); backdrop-filter: blur(8px);
  border: 1px solid rgba(196,168,107,0.25);
  color: var(--cream); padding: 10px 16px; border-radius: 6px;
  font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase;
  font-weight: 500; opacity: 0; transition: opacity 0.4s;
  pointer-events: none; z-index: 5;
}
#info-card.shown { opacity: 1; }
#info-card .gold { color: var(--gold); }
</style>
</head>
<body>

<div id="loader">
  <div class="ring"></div>
  <div id="loader-msg">Loading masterplan</div>
  <div id="loader-progress">0%</div>
</div>

<div id="topbar">
  <h1>Riverland · 3D Masterplan</h1>
  <small id="topbar-meta">Stylized clay model · architect's geometry</small>
</div>

<div id="controls">
  <h3>Camera</h3>
  <button data-view="oblique" class="active">Oblique</button>
  <button data-view="topdown">Top-down</button>
  <button data-view="approach">Approach</button>
  <button data-view="orbit" id="bSpin" style="margin-top:4px;">Auto-rotate</button>
  <h3>Lighting</h3>
  <button data-style="clay" class="active">Clay</button>
  <button data-style="warm">Warm</button>
  <button data-style="moonlit">Moonlit</button>
  <h3>Vertical scale
    <span id="vScale" style="float:right;color:var(--gold);">1.0×</span>
  </h3>
  <input type="range" id="rScale" min="0.5" max="2.5" step="0.1" value="1">
</div>

<div id="hud">
  <span class="key">Drag</span> rotate · <span class="key">Right-drag</span> pan · <span class="key">Scroll</span> zoom
</div>

<div id="info-card">
  <span class="gold">Riverland</span> · 1.5 km × 1.7 km · architect render geometry
</div>

<div id="scene"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.166.1/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.166.1/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader }    from 'three/addons/loaders/GLTFLoader.js';

// ===== RENDERER + SCENE =====
const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000, 0);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
document.getElementById('scene').appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x1f2c1d, 1500, 4500);

const camera = new THREE.PerspectiveCamera(36, window.innerWidth / window.innerHeight, 1, 8000);

// ===== LIGHTING (palette swappable) =====
const sun = new THREE.DirectionalLight(0xfff2cf, 1.6);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.bias = -0.0004;
sun.shadow.camera.left = sun.shadow.camera.bottom = -1500;
sun.shadow.camera.right = sun.shadow.camera.top = 1500;
sun.shadow.camera.near = 1;
sun.shadow.camera.far = 5000;
scene.add(sun, sun.target);

const sky = new THREE.HemisphereLight(0xfaf2dd, 0xa89473, 0.55);
scene.add(sky);
const fill = new THREE.AmbientLight(0xffe7be, 0.18);
scene.add(fill);

const STYLES = {
  clay:    { sun: 0xfff8e0, sky: 0xfaf2dd, ground: 0xa89473,
             villa: 0xefe6cf, wall: 0xd9c8a3, ground_c: 0x7a8a5e,
             water: 0x6b8aa3, sun_int: 1.5, sky_int: 0.6,
             bgTop: 0x2a3829, bgBot: 0x0e1a0e },
  warm:    { sun: 0xffd9a0, sky: 0xffe5b8, ground: 0x8c6a4a,
             villa: 0xf3dcb6, wall: 0xc8a36e, ground_c: 0x96885e,
             water: 0x6f9ab2, sun_int: 1.7, sky_int: 0.5,
             bgTop: 0x3a2818, bgBot: 0x1a0e08 },
  moonlit: { sun: 0xb8c9e0, sky: 0xc8d4e8, ground: 0x4d5e6e,
             villa: 0xd0d8e0, wall: 0x8a96a6, ground_c: 0x4f5d4e,
             water: 0x4f7088, sun_int: 0.8, sky_int: 0.5,
             bgTop: 0x182030, bgBot: 0x080e16 },
};
let currentStyle = 'clay';

function applyStyle(key) {
  const s = STYLES[key]; if (!s) return;
  currentStyle = key;
  sun.color.setHex(s.sun);  sun.intensity = s.sun_int;
  sky.color.setHex(s.sky);  sky.groundColor.setHex(s.ground);
  sky.intensity = s.sky_int;
  scene.traverse(o => {
    if (!o.isMesh || !o.userData._kind) return;
    const k = o.userData._kind;
    if (k === 'villa')   o.material.color.setHex(s.villa);
    if (k === 'wall')    o.material.color.setHex(s.wall);
    if (k === 'water')   o.material.color.setHex(s.water);
    if (k === 'ground')  o.material.color.setHex(s.ground_c);
  });
  document.body.style.background =
    `linear-gradient(180deg, #${s.bgTop.toString(16).padStart(6,'0')} 0%,
                            #${s.bgBot.toString(16).padStart(6,'0')} 100%)`;
  document.querySelectorAll('[data-style]').forEach(b =>
    b.classList.toggle('active', b.dataset.style === key));
}


// ===== ORBIT CONTROLS =====
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.07;
controls.minDistance = 200;
controls.maxDistance = 4000;
controls.maxPolarAngle = Math.PI * 0.49;
controls.target.set(0, 100, 0);

// (Photo-ground experimentation removed — the OBJ's own terrain mesh is
// the source of truth.  We just stylise its materials via the lighting
// modes below.)

// ===== LOAD GLB =====
const SCALE_M = 1;   // 1 unit = 1 metre
let model = null;
let modelExaggerationGroup = new THREE.Group();
scene.add(modelExaggerationGroup);

const loader = new GLTFLoader();
loader.load(
  'assets/masterplan/masterplan.glb',
  (gltf) => {
    document.getElementById('loader-progress').textContent = 'Optimising…';
    model = gltf.scene;

    // Stylize materials.  We don't have textures from the architect, so we
    // assign colors based on simple heuristics: tall thin = villa walls,
    // flat large = ground, etc.
    const cream      = STYLES.clay.villa;
    const wall       = STYLES.clay.wall;
    const ground     = STYLES.clay.ground_c;
    const roof       = 0xa64a2c;

    let bbox = new THREE.Box3().setFromObject(model);
    const size = bbox.getSize(new THREE.Vector3());

    model.traverse(o => {
      if (!o.isMesh) return;
      const obb = new THREE.Box3().setFromObject(o);
      const sz = obb.getSize(new THREE.Vector3());
      const flatness = sz.y / Math.max(sz.x, sz.z, 1);     // flat = small Y
      const area = sz.x * sz.z;
      let kind = 'wall', col = wall;
      if (flatness < 0.05 && area > 1500) { kind = 'ground'; col = ground; }
      else if (sz.y > 3 && area < 200)    { kind = 'villa';  col = cream; }
      else if (sz.y < 0.6)                { kind = 'ground'; col = ground; }
      o.userData._kind = kind;
      o.material = new THREE.MeshStandardMaterial({
        color: col, roughness: 0.92, metalness: 0,
        flatShading: false, side: THREE.DoubleSide,
      });
      o.castShadow = true; o.receiveShadow = true;
    });

    // Place into the exaggeration group so we can scale Y for relief
    modelExaggerationGroup.add(model);

    // Compute model bounds and frame the camera
    bbox = new THREE.Box3().setFromObject(model);
    const center = bbox.getCenter(new THREE.Vector3());
    const span = bbox.getSize(new THREE.Vector3());

    controls.target.set(center.x, center.y + span.y * 0.1, center.z);

    // Sun position based on bbox
    sun.position.set(center.x + span.x * 0.6, center.y + span.y * 1.4,
                     center.z - span.z * 0.4);
    sun.target.position.copy(center);

    // Default oblique camera
    flyToView('oblique', { instant: true });

    applyStyle('clay');
    setTimeout(() => document.getElementById('loader').style.display = 'none', 200);
    setTimeout(() => {
      const card = document.getElementById('info-card');
      card.classList.add('shown');
      setTimeout(() => card.classList.remove('shown'), 4000);
    }, 800);

    window.DEBUG3D = { renderer, scene, camera, controls, model };
  },
  (xhr) => {
    if (xhr.total) {
      const pct = Math.round(xhr.loaded / xhr.total * 100);
      document.getElementById('loader-progress').textContent = pct + '%';
    } else {
      document.getElementById('loader-progress').textContent =
        Math.round(xhr.loaded / 1024) + ' KB';
    }
  },
  (err) => {
    document.getElementById('loader-msg').textContent = 'Load failed';
    let hint = err.message || 'unknown';
    if (location.protocol === 'file:') {
      hint = 'Browsers block binary fetch on file://. ' +
             'Open via http://localhost:8090/masterplan_clay.html instead, ' +
             'or deploy to GitHub Pages.';
    }
    document.getElementById('loader-progress').textContent = hint;
    document.getElementById('loader-progress').style.maxWidth = '420px';
    document.getElementById('loader-progress').style.textAlign = 'center';
    document.getElementById('loader-progress').style.lineHeight = '1.5';
  }
);

// ===== CAMERA VIEW PRESETS =====
const VIEWS = {
  oblique:  { polar: 1.05, az: -0.45, dist: 1700 },
  topdown:  { polar: 0.05, az: 0,     dist: 1900 },
  approach: { polar: 1.35, az: -1.1,  dist: 1100 },
};
function flyToView(name, opts = {}) {
  const v = VIEWS[name]; if (!v || !model) return;
  const target = controls.target.clone();
  const r = v.dist;
  const x = target.x + r * Math.sin(v.polar) * Math.sin(v.az);
  const y = target.y + r * Math.cos(v.polar);
  const z = target.z + r * Math.sin(v.polar) * Math.cos(v.az);
  if (opts.instant) {
    camera.position.set(x, y, z);
    camera.lookAt(target);
  } else {
    const start = camera.position.clone();
    const end = new THREE.Vector3(x, y, z);
    const t0 = performance.now(), dur = 800;
    function tick() {
      const k = Math.min(1, (performance.now() - t0) / dur);
      const ee = 1 - Math.pow(1 - k, 3);
      camera.position.lerpVectors(start, end, ee);
      camera.lookAt(target);
      if (k < 1) requestAnimationFrame(tick);
    }
    tick();
  }
  document.querySelectorAll('[data-view]').forEach(b =>
    b.classList.toggle('active', b.dataset.view === name));
}

// ===== UI WIRING =====
document.querySelectorAll('[data-view]').forEach(b =>
  b.addEventListener('click', () => flyToView(b.dataset.view)));

document.querySelectorAll('[data-style]').forEach(b =>
  b.addEventListener('click', () => applyStyle(b.dataset.style)));

let spinning = false;
document.getElementById('bSpin').addEventListener('click', () => {
  spinning = !spinning;
  controls.autoRotate = spinning;
  controls.autoRotateSpeed = 0.6;
  document.getElementById('bSpin').textContent =
    spinning ? '⏸ Stop' : 'Auto-rotate';
});

document.getElementById('rScale').addEventListener('input', e => {
  const v = parseFloat(e.target.value);
  document.getElementById('vScale').textContent = v.toFixed(1) + '×';
  modelExaggerationGroup.scale.y = v;
});

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ===== RENDER LOOP =====
function tick() {
  controls.update();
  renderer.render(scene, camera);
  requestAnimationFrame(tick);
}
tick();
</script>
</body>
</html>
